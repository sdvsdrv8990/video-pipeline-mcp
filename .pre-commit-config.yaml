# I4: pre-commit — линт/типы перед коммитом. Хуки=system (venv-инструменты),
# версии совпадают с CI (I3). Форматтер НЕ включён намеренно (не переписываем весь код).
# Установка: pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: ruff check --fix
        language: system
        types: [python]
      - id: mypy
        name: mypy (types)
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
