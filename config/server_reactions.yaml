# server_reactions.yaml — реестр реакций сервера (D4)
#
# Движок (core/engine) при ошибке смотрит сюда по `code` и собирает ErrorDetail.
# Добавить реакцию = строка здесь, не код. Формат читается core/reactions/reactions.py:
#   <CODE>:
#     class: ai_recoverable | server_recoverable | human_required | integrity | unknown
#     message_template: "текст по умолчанию"
#     recovery: { suggested_tool, suggested_params, reason }

# ═══ Ошибки движка/транспорта ═══

TOOL_NOT_FOUND:
  class: ai_recoverable
  message_template: "Инструмент не найден."
  recovery:
    suggested_tool: "tools/list"
    reason: "Посмотри доступные инструменты и вызови существующий."

VALIDATION_ERROR:
  class: ai_recoverable
  message_template: "Параметры не соответствуют input_schema инструмента."
  recovery:
    suggested_tool: "tools/list"
    reason: "Сверь параметры со схемой инструмента и повтори вызов."

INTERNAL_ERROR:
  class: human_required
  message_template: "Внутренняя ошибка сервера."
  recovery:
    reason: "Непредвиденный сбой в хендлере. Нужна диагностика человеком."

# ═══ Файловая система (safe-join, D1) ═══

PATH_ESCAPE:
  class: ai_recoverable
  message_template: "Путь выходит за пределы workspace/."
  recovery:
    reason: "Используй путь ВНУТРИ workspace, без '..' и абсолютных путей."

MISSING_TARGET_FILE:
  class: ai_recoverable
  message_template: "Файл '{missing_path}' не найден."
  recovery:
    suggested_tool: "fs_create_file"
    reason: "Создай файл перед чтением."

# D4: добавлены коды из fs_*/table_* хендлеров (были хардкодом вне реестра).
FILE_NOT_FOUND:
  class: ai_recoverable
  message_template: "Файл не найден."
  recovery:
    suggested_tool: "fs_create_file"
    reason: "Создай файл перед чтением."

TABLE_NOT_FOUND:
  class: ai_recoverable
  message_template: "Таблица не найдена."
  recovery:
    suggested_tool: "fs_create_project_structure"
    reason: "Создай структуру проекта."

FILE_EXISTS:
  class: ai_recoverable
  message_template: "Файл или каталог уже существует: {path}"
  recovery:
    reason: "Удали существующий файл или используй другое имя."

DIRECTORY_NOT_EMPTY:
  class: ai_recoverable
  message_template: "Каталог не пуст: {path}"
  recovery:
    reason: "Используй force=true для удаления с содержимым или очисти каталог вручную."

TEMPLATE_NOT_FOUND:
  class: ai_recoverable
  message_template: "Шаблон не найден: {template}"
  recovery:
    reason: "Проверь имя шаблона в config/templates/workspace/."

NO_FRAGMENTS:
  class: ai_recoverable
  message_template: "Нет фрагментов для создания."
  recovery:
    reason: "Укажи template или fragments."

INVALID_EXTENSION:
  class: ai_recoverable
  message_template: "Неверное расширение файла: {path}"
  recovery:
    reason: "Используй расширение .py для Python-скриптов."

STRUCTURE_INCOMPLETE:
  class: ai_recoverable
  message_template: "Структура неполна: отсутствуют {missing_fragments}."
  recovery:
    suggested_tool: "fs_create_project_structure"
    reason: "Дострой недостающие фрагменты структуры."

# ═══ Провайдеры (медиа) ═══

PROVIDER_FAILED:
  class: server_recoverable
  message_template: "Внешний провайдер недоступен."
  recovery:
    reason: "Сервер выполняет retry с backoff и fallback из model_routing.yaml; при исчерпании — человек."

CONTENT_REJECTED:
  class: ai_recoverable
  message_template: "Провайдер отклонил контент (модерация)."
  recovery:
    reason: "Переформулируй промпт — повтор того же промпта даст тот же отказ."

LOCAL_INFERENCE_FAILED:
  class: server_recoverable
  message_template: "Сбой локального инференса."
  recovery:
    reason: "Деградация модели (large→medium→base) или проверка ресурсов; при исчерпании — человек."

# ═══ Аутентификация (D3) ═══

AUTH_REQUIRED:
  class: human_required
  message_template: "Требуется аутентификация. Заголовок Authorization отсутствует."
  recovery:
    reason: "Передай bearer-токен в заголовке Authorization: Bearer <token>."

AUTH_FAILED:
  class: human_required
  message_template: "Аутентификация не пройдена. Неверный токен."
  recovery:
    reason: "Проверь значение MCP_AUTH_TOKEN и повтори запрос."

# ═══ Таблицы: данные (Категория 3) ═══

SHEET_NOT_FOUND:
  class: ai_recoverable
  message_template: "Лист не найден в таблице."
  recovery:
    suggested_tool: "json_read_snapshot"
    reason: "Проверь имя листа (регистр важен) или создай через excel_add_sheet."

COLUMN_NOT_FOUND:
  class: ai_recoverable
  message_template: "Столбец не найден в листе."
  recovery:
    reason: "Сверь имя столбца со схемой (json_read_snapshot) или добавь через excel_add_column."

ROW_NOT_FOUND:
  class: ai_recoverable
  message_template: "Строка с таким ID не найдена."
  recovery:
    reason: "Проверь ID строки (table_get_column отдаст список ID) или создай через table_append."

COMPUTED_READONLY:
  class: ai_recoverable
  message_template: "Столбец вычисляемый (формула) — запись данных запрещена."
  recovery:
    reason: "Формулы не перезаписываются. Меняй исходные столбцы, из которых считается формула."

ENUM_VIOLATION:
  class: ai_recoverable
  message_template: "Значение вне допустимого enum столбца."
  recovery:
    reason: "Используй одно из значений enum из схемы столбца."

INVALID_ACTION:
  class: ai_recoverable
  message_template: "Недопустимое действие для очереди."
  recovery:
    reason: "В очередь идут только set/append/delete; чтения (get_column/get_row) выполняются сразу."

# ═══ Таблицы: структура (Категория 2, excel_*) ═══

WORKBOOK_NOT_FOUND:
  class: ai_recoverable
  message_template: "Книга .xlsx не найдена."
  recovery:
    suggested_tool: "excel_create_workbook"
    reason: "Создай книгу через excel_create_workbook или проверь путь."

SHEET_EXISTS:
  class: ai_recoverable
  message_template: "Лист с таким именем уже существует."
  recovery:
    reason: "Выбери свободное имя или переименуй существующий через excel_rename_sheet."

LAST_SHEET:
  class: ai_recoverable
  message_template: "Нельзя удалить последний лист книги."
  recovery:
    reason: "В книге всегда должен оставаться хотя бы один лист."

COLUMN_EXISTS:
  class: ai_recoverable
  message_template: "Столбец с таким заголовком уже существует."
  recovery:
    reason: "Используй другое имя или удали существующий через excel_delete_column."

FORMULA_PROTECTED:
  class: ai_recoverable
  message_template: "В ячейке уже есть формула — тихая перезапись запрещена."
  recovery:
    reason: "Перезапись критической формулы недопустима молча. Передай overwrite=true осознанно."

# ═══ Структура: реестр связей / ORPHAN (Ф2) ═══

UNLINKED_ENTITY:
  class: ai_recoverable
  message_template: "Сущность {name} не привязана к родителю типа {needs_parent_type}."
  recovery:
    suggested_tool: "structure_link"
    reason: "Оставить как есть можно, но связь не установлена. Привяжи через structure_link (в одном месте)."

ENTITY_NOT_FOUND:
  class: ai_recoverable
  message_template: "Сущность не найдена в реестре связей."
  recovery:
    suggested_tool: "structure_status"
    reason: "Проверь имя/тип через structure_status; при необходимости создай через structure_create."

# ═══ Fallback ═══

DEFAULT:
  class: unknown
  message_template: "Непредвиденная ошибка."
  recovery:
    reason: "Нет протокола реакции для этого кода — требуется решение человека."
