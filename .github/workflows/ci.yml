# I3: CI-гейт под фазу фиксов. Хард-гейты: ruff, mypy, тесты (in-process), bandit, gitleaks.
# Advisory: pip-audit (уязвимости зависимостей — требуют dep-bump с регрессией на живом сервере).
# firewall/tunnel + adversarial-симуляции = integration (нужен живой сервер/туннель) → НЕ в этом гейте (C2).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: ruff
        run: ruff check .
      - name: mypy
        run: mypy

  test:
    name: test (in-process, script exit-code = gate)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      # LibreOffice — движок пересчёта формул (F29 validate_formulas). Без него F29-тест скипается.
      - name: install LibreOffice (formula recalc)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libreoffice-calc
      # Тесты — самостоятельные скрипты (async, вне pytest-asyncio); каждый exit!=0 при провале.
      # firewall/tunnel исключены: нужен живой сервер/туннель (integration/C2).
      - name: quick tests
        run: |
          python3 tests/quick/test_audit_fixes.py
          python3 tests/quick/test_search.py
          python3 tests/quick/test_structure.py
          python3 tests/quick/test_tables.py
      # C2 adversarial-симуляции — in-process (create_server/Firewall), живой сервер не нужен.
      - name: adversarial sims (C2)
        run: |
          python3 tests/virus_injection/test_virus_injection.py
          python3 tests/cache_injection/test_cache_injection.py
          python3 tests/bot_army/test_bot_army.py
          python3 tests/cache_overflow/test_cache_overflow.py
          python3 tests/config_change/test_config_change.py
          python3 tests/render_draft_final/test_render_draft_final.py

  security:
    name: security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: bandit (medium+)
        run: bandit -r core server.py -ll
      - name: pip-audit (advisory — dep-hardening отдельным воркстримом)
        run: pip-audit
        continue-on-error: true

  gitleaks:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
